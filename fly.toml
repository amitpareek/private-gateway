# Fly.io configuration for pgproxy.
#
# pgproxy is a Fly 6PN Postgres proxy. Setting the TS_AUTHKEY secret also
# turns it into a real tailscaled (TUN) subnet router + exit node, so the
# tailnet can reach Fly apps (incl. pgproxy) via *.internal once split DNS
# is configured. Omit TS_AUTHKEY for a plain 6PN-only proxy. See project.md
# for the architecture and the full config table.
#
# Before first deploy:
#
#   fly apps create private-gateway
#   fly secrets set TS_AUTHKEY="tskey-auth-..."        # ephemeral+reusable+tagged; omit for 6PN-only
#   fly deploy
#
# Then, one-time in the Tailscale admin console:
#   - approve the advertised routes (or grant an autoApprovers ACL to the tag)
#   - split DNS: "internal" search domain -> this node's Tailscale IP
#
# Add databases later (secret; contains passwords). An optional "allow"
# list restricts which *Tailscale* users may use that port (by login;
# empty = anyone; Fly 6PN apps ignore it):
#   fly secrets set DESTINATION_PG_DBS='[
#     {"name":"prod","listen":5432,"target":"ep-xxx.aws.neon.tech:5432",
#      "dbname":"main","user":"app_rw","password":"...","allow":["alice@example.com"]},
#     {"name":"readonly","listen":5433,"target":"ep-xxx.aws.neon.tech:5432",
#      "dbname":"main","user":"app_ro","password":"..."}
#   ]'
#   fly deploy
#
# Secrets (never put these in [env]): TS_AUTHKEY, DESTINATION_PG_DBS.

# Default app name; the actual app is set at deploy time (e.g. `fly deploy -a <name>`).
app = "private-gateway"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  # Zero-config: set TS_AUTHKEY (a secret, via `fly secrets set`) to enable
  # Tailscale; omit it for a 6PN-only proxy. Every other knob has a default in
  # fly-router.sh / the binary; the full list with rationale is in project.md.
  # Set a var here only to override a default, e.g.:
  #
  # TS_ADVERTISE_ROUTES  = "fdaa::/16"   # default: auto-derive the org /48

[[vm]]
  size      = "shared-cpu-1x"
  memory_mb = 512

# No [[services]] block: pgproxy is internal-only. Postgres (per-db listen
# ports), HTTPS CONNECT (8080), debug/dev page (80), and the .internal DNS
# forwarder (53) are reached over Fly 6PN and, for the tailnet, through this
# machine's own Tailscale subnet router.
