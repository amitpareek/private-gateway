# Fly.io configuration for pgproxy.
#
# Before first deploy:
#
#   fly apps create pgproxy
#   fly secrets set TS_AUTHKEY="tskey-auth-..."
#   fly deploy
#
# The proxy will start up with no databases configured. Open
# http://pgproxy/ (over Tailscale) for the dev reference page and
# copy the example into a `fly secrets set DESTINATION_PG_DBS='...'`
# command when you're ready to add databases:
#
#   fly secrets set DESTINATION_PG_DBS='[
#     {"name":"rw","listen":5432,
#      "target":"ep-xxx.aws.neon.tech:5432"},
#     {"name":"readonly","listen":5433,
#      "target":"ep-yyy-pooler.aws.neon.tech:5432"}
#   ]'
#   fly deploy
#
# Use an *ephemeral + reusable* Tailscale auth key; state lives in
# /tmp (tmpfs), so each restart re-auths.

app = "pgproxy"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  # Non-secret defaults; uncomment to override.
  # UPSTREAM_CA_FILE = "/etc/ssl/certs/ca-certificates.crt"
  # STATE_DIR        = "/tmp/tsnet"
  # TS_HOSTNAME      = "pgproxy"

[[vm]]
  size      = "shared-cpu-1x"
  memory_mb = 512

# No [[services]] block: pgproxy is internal-only. Postgres on the
# per-database listen ports over 6PN/Tailscale; HTTPS CONNECT proxy
# on 8080 (Fly 6PN only); debug + dev reference page on 80
# (Tailscale only).
